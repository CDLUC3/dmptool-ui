query Me{
  me {
    id
    givenName
    surName
    languageId
    role
    emails {
      id
      email
      isPrimary
      isConfirmed
    }
    errors {
      general
      email
      password
      role
    }
    affiliation {
      id
      name
      displayName
      searchName
      uri
      acronyms
      feedbackEmails
      feedbackEnabled
      feedbackMessage
    }
  }
}

query Users($paginationOptions: PaginationOptions, $term: String, $role: UserRole) {
  users(paginationOptions: $paginationOptions, term: $term, role: $role) {
    items {
      givenName
      surName
      email
      active
      role
      created
      last_sign_in
      plans {
        id
        title
        dmpId
      }
      id
      affiliation {
        displayName
      }
    }
    hasNextPage
    currentOffset
    hasPreviousPage
    totalCount
    nextCursor
    limit
  }
}

