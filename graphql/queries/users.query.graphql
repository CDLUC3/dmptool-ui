query Me{
  me {
    id
    givenName
    surName
    languageId
    role
    emails {
      id
      email
      isPrimary
      isConfirmed
    }
    errors {
      general
      email
      password
      role
    }
    affiliation {
      id
      name
      displayName
      searchName
      uri
      acronyms
      feedbackEmails
      feedbackEnabled
      feedbackMessage
    }
  }
}

query Users($term: String, $role: UserRole, $affiliationId: String, $paginationOptions: PaginationOptions, ) {
  users(term: $term, role: $role, affiliationId: $affiliationId, paginationOptions: $paginationOptions, ) {
    items {
      givenName
      surName
      email
      active
      role
      created
      last_sign_in
      plans {
        id
        title
        dmpId
        project {
          id
          isTestProject
        }
      }
      id
      affiliation {
        id
        displayName
        uri
      }
      ssoId
      orcid
    }
    hasNextPage
    currentOffset
    hasPreviousPage
    totalCount
    nextCursor
    limit
  }
}

query User($userId: Int!) {
  user(userId: $userId) {
    email
    givenName
    surName
    role
    affiliation {
      id
      displayName
      uri
    }
    languageId
    ssoId
    orcid
  }
}