query Affiliations($name: String!) {
  affiliations(name: $name) {
    totalCount
    nextCursor
    items {
      id
      displayName
      displayAbbreviation
      uri
      apiTarget
    }
  }
}

query AffiliationFunders($name: String!, $funderOnly: Boolean, $paginationOptions: PaginationOptions){
  affiliations(name: $name, funderOnly: $funderOnly, paginationOptions: $paginationOptions) {
    totalCount
    nextCursor
    items {
      id
      displayName
      displayAbbreviation
      apiTarget
      uri
    }
  }
}

query ManagedAffiliationsWithGuidance($name: String, $versionedTemplateId: Int!, $paginationOptions: PaginationOptions) {
  managedAffiliationsWithGuidance(name: $name, versionedTemplateId: $versionedTemplateId, paginationOptions:$paginationOptions) {
    items {
      id
      funder
      displayName
      displayAbbreviation
      uri
      acronyms
    }
    limit
    totalCount
    hasNextPage
    hasPreviousPage
    nextCursor
  }
}

query AffiliationById($affiliationId: Int!) {
  affiliationById(affiliationId: $affiliationId) {
    id
    uri
    provenance
    name
    displayName
    displayAbbreviation
    displayDomain
    homepage
    fundrefId
    acronyms
    aliases
    types
    funder
    managed
    active
    logoName
    logoURI
    feedbackEmails
    feedbackEnabled
    feedbackMessage
    contactName
    contactEmail
    subHeaderLinks {
      id
      url
      text
    }
    ssoEntityId
    ssoEmailDomains
    apiTarget
  }
}
