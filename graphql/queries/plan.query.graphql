query Plan($planId: Int!) {
  plan(planId: $planId) {
    id
    versionedTemplate {
      id
      template {
        id
        name
      }
      name
      owner {
        uri
        name
        acronyms
        displayName
      }
      version
      created
    }
    fundings {
      id
      projectFunding {
        affiliation {
          displayName
        }
      }
    }
    visibility
    status
    project {
      fundings {
        affiliation {
          displayName
          name
        }
        funderOpportunityNumber
      }
      title
      collaborators {
        user {
          id
          affiliation {
            id
            uri
          }
        }
        accessLevel
      }
    }
    members {
      isPrimaryContact
      projectMember {
        givenName
        surName
        email
        orcid
        memberRoles {
          label
        }
      }
    }
    versionedSections {
      answeredQuestions
      displayOrder
      versionedSectionId
      title
      totalQuestions
      tags {
        name
        slug
        id
        slug
        description
      }
      sectionType
      customSectionId
      totalRequiredQuestions
      answeredRequiredQuestions
    }
    progress {
      answeredQuestions
      percentComplete
      totalQuestions
    }
    created
    createdById
    modified
    dmpId
    registered
    title
    feedback {
      id
      completed
    }
    feedbackStatus {
      id
      status
    }
    planCreator {
      id
      affiliation {
        uri
      }
    }
    readOnly
  }
}

query Plans($userId: Int!, $term: String, $paginationOptions: PaginationOptions) {
  plans(userId: $userId, term: $term, paginationOptions: $paginationOptions) {
    items {
      id
      templateOwnerAffiliationName
      title
      visibility
      modified
      createdBy
      templateTitle
      user {
        givenName
        surName
        id
        createdById
      }
    }
    limit
    hasNextPage
    hasPreviousPage
    currentOffset
    availableSortFields
    nextCursor
    totalCount
  }
}