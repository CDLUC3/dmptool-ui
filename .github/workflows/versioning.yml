name: Automated Versioning

on:
  pull_request:
    types:
      - closed
    branches:
      - stage

permissions:
  contents: write

jobs:
  version:
    if: github.event.pull_request.merged == true
    #GitHub-hosted runner with Ubuntu
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
        ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version bump
        id: bump
        run: |
          PR_TITLE="${{ github.event.pull_request.title}}"

          echo "PR title:"
          echo "$PR_TITLE"

          if [[ "$PR_TITLE" =~ ^major: ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" =~ ^minor: ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" =~ ^patch: ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "PR title must start with major:, minor:, or patch:"
            exit 1
          fi

      - name: Bump version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Get new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          {
            head -n 1 CHANGELOG.md
            echo ""
            echo "## v${VERSION}"
            echo ""
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp

          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json CHANGELOG.md

          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          git commit -m "chore: release v${{ steps.version.outputs.version }}" || exit 0

          git tag "v${{ steps.version.outputs.version }}"

          git push origin HEAD:${{ github.event.pull_request.base.ref }}
          git push --tags