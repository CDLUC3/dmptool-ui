name: Validate Release PR

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - stage

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate title
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if [[ "$TITLE" =~ ^(major|minor|patch): ]]; then
            exit 0
          fi

          echo "::error::PR title must start with major:, minor:, or patch:"
          exit 1